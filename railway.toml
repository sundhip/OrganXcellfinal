[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c \"daphne -b 0.0.0.0 -p ${PORT:-8000} organxcell.asgi:application\""
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"

[[services]]
name = "worker"
startCommand = "celery -A organxcell worker --loglevel=info --concurrency=2"
